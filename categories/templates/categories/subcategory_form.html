{% extends 'base.html' %}
{% block title %}{{ title }} — ShopDjango{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-4">{{ title }}</h5>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label" style="font-size:0.9rem">{{ field.label }}{% if field.field.required %} <span class="text-danger">*</span>{% endif %}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger" style="font-size:0.8rem">{{ field.errors.0 }}</div>{% endif %}
                        </div>
                    {% endfor %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-accent">Save Subcategory</button>
                        <a href="{% url 'categories:list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
