{% extends 'base.html' %}
{% block title %}Delete {{ type }} — ShopDjango{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-danger shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2.5rem"></i>
                <h5 class="mt-3 fw-bold">Delete {{ type }}</h5>
                <p class="text-muted">Are you sure you want to delete <strong>"{{ object }}"</strong>? This action cannot be undone.</p>
                <form method="post" class="d-flex gap-2 justify-content-center mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
